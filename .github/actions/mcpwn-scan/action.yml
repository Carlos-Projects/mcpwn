name: "MCPwn Scan"
description: "Scan an MCP server for security vulnerabilities"
inputs:
  url:
    description: "MCP server URL"
    required: false
  stdio:
    description: "Command to start the MCP server"
    required: false
  fail-on:
    description: "Fail workflow if findings at this severity or above (critical, high, medium, low)"
    required: false
    default: "high"
  output:
    description: "Path to save JSON results"
    required: false
    default: "mcpwn-results.json"

runs:
  using: "composite"
  steps:
    - name: Install MCPwn
      run: pip install mcpwn-core
      shell: bash

    - name: Scan MCP server
      id: scan
      env:
        MCPWN_URL: ${{ inputs.url }}
        MCPWN_STDIO: ${{ inputs.stdio }}
        MCPWN_OUTPUT: ${{ inputs.output }}
      run: |
        if [ -n "$MCPWN_URL" ]; then
          mcpwn survey --url "$MCPWN_URL" --output "$MCPWN_OUTPUT"
        elif [ -n "$MCPWN_STDIO" ]; then
          mcpwn survey --stdio "$MCPWN_STDIO" --output "$MCPWN_OUTPUT"
        else
          echo "Provide either url or stdio"
          exit 1
        fi
      shell: bash

    - name: Check severity threshold
      env:
        MCPWN_OUTPUT: ${{ inputs.output }}
        MCPWN_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        python3 -c "
        import json, sys, os
        data = json.load(open(os.environ['MCPWN_OUTPUT']))
        sev_order = {'info': 0, 'low': 1, 'medium': 2, 'high': 3, 'critical': 4}
        threshold = sev_order.get(os.environ['MCPWN_FAIL_ON'], 3)
        max_sev = max((sev_order.get(f['severity'], 0) for f in data['findings']), default=0)
        if max_sev >= threshold:
          print(f'Failing: max severity ({max_sev}) >= threshold ({threshold})')
          sys.exit(1)
        print('OK: all findings below threshold')
        "
      shell: bash

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: mcpwn-results
        path: ${{ inputs.output }}